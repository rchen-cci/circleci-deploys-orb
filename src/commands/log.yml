description: >
  Log a deployment event in the CircleCI Deploys UI without status lifecycle tracking.
  Use this when you do not need plan/update status management, or when calling from
  a custom job where you manage deploy steps yourself.

parameters:
  component_name:
    type: string
    default: ""
  environment_name:
    type: string
    default: ""
  namespace:
    type: string
    default: ""
  target_version:
    type: string
    default: ""
    description: >
      Version identifier shown in the Deploys UI.
      If not provided, defaults to the short commit SHA at runtime.

steps:
  - run:
      name: Log deployment marker
      environment:
        PARAM_COMPONENT_NAME: << parameters.component_name >>
        PARAM_ENVIRONMENT_NAME: << parameters.environment_name >>
        PARAM_NAMESPACE: << parameters.namespace >>
        PARAM_TARGET_VERSION: << parameters.target_version >>
      command: <<include(scripts/log.sh)>>
