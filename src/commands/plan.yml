description: >
  Plan a deployment marker. Call this before your deploy step.
  The marker will appear in the CircleCI Deploys UI with pending status.
  Follow up with deploys/update_status to update the status as the
  deployment progresses, or use deploys/log instead if you do not need
  status lifecycle tracking.

parameters:
  deploy_name:
    type: string
    default: "deploy"
    description: >
      Unique identifier for this deployment within the workflow.
      Must be unique if planning multiple deployments in the same workflow.
  component_name:
    type: string
    default: ""
    description: Component name shown in the Deploys UI. Defaults to project name if not set.
  environment_name:
    type: string
    default: ""
    description: Target environment name. Defaults to 'default' if not set.
  namespace:
    type: string
    default: ""
    description: >
      Namespace of the deployment. Relevant for Kubernetes deployments.
      Defaults to 'default' if not set.
  target_version:
    type: string
    default: ""
    description: >
      Version identifier shown in the Deploys UI.
      If not provided, defaults to the short commit SHA at runtime.

steps:
  - run:
      name: Plan deployment marker
      environment:
        PARAM_DEPLOY_NAME: << parameters.deploy_name >>
        PARAM_COMPONENT_NAME: << parameters.component_name >>
        PARAM_ENVIRONMENT_NAME: << parameters.environment_name >>
        PARAM_NAMESPACE: << parameters.namespace >>
        PARAM_TARGET_VERSION: << parameters.target_version >>
      command: <<include(scripts/plan.sh)>>
